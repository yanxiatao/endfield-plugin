# 抽卡相关配置（含模拟抽卡）
banner_info:
  # 卡池信息来源：
  # - backend_api：使用后端 API（bili_wiki_activities）
  # - local_file：使用本地 data/game_banners.yaml
  source: backend_api

simulate:
  # 功能开关：关闭后所有人无法使用模拟抽卡
  enable: true
  # 群聊白名单：不填则所有群可用；仅影响群聊，好友仅受功能开关影响
  group_whitelist: []
  # 每天使用次数（按卡池），0 表示不限制；单抽/十连/模拟抽卡 均计为 1 次
  daily_limit:
    limited: 0   # 限定池
    standard: 0  # 常驻池
    weapon: 0    # 武器池
