# 授权请求：客户端名称（授权登陆时展示）
auth_client_name: "终末地机器人"
# 授权请求：客户端类型（如 bot）
auth_client_type: "bot"
# 授权请求：授权范围
auth_scopes:
  - user_info
  - binding_info
  - game_data
  - attendance
# API 秘钥（用于第三方客户端认证，通过 X-API-Key 请求头传递，请自行填写）
api_key: ""
# 是否启用 Wiki 干员攻略（关闭后 :攻略 仅查询本地/默认攻略图）
use_wiki_strategy: true
# 理智订阅推送任务配置
push_stamina:
  # 任务开关
  enabled: true
  # 默认每 15 分钟执行一次
  cron: "*/15 * * * *"
# 公告订阅推送任务配置
push_announcement:
  # 任务开关
  enabled: true
  # 默认每 2 分钟轮询一次
  cron: "*/2 * * * *"
